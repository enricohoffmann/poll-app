
<article class="answer-result">
    <span class="answer-result__identifier">{{getIdentifier()}}</span>

    <div class="answer-result__track">
        <div class="answer-result__bar" [style.width.%]="(percentage() | resultRounding)"></div>
    </div>

    <span class="answer-result__percent">{{percentage() | resultRounding}}%</span>
</article>
