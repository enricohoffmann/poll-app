<figure class="question-field-section">
    <figcaption class="question-field-section__header">
        <p class="question-field-section__text">{{questionIndex() + 1}}. Question</p>
        <app-button [buttonVariant]="'trashBtn'" [hasIcon]="false" [hasTrashIcon]="true" (click)="onRemoveQuestion()"></app-button>
    </figcaption>
    <app-input-field class="question-field-section__question" [inputFieldVariant]="'noLabel'"
        [inputControl]="getQuestion()" [hasTrash]="false"></app-input-field>
    <div class="question-field-section__answers">
        <p class="question-field-section__text">Answers</p>
        <div class="question-field-section__multiple-select-container">
            <input type="checkbox">
            <span class="question-field-section__text--md">Allow multiple answers.</span>
        </div>
    </div>
    @for(answer of answers.controls; track $index){
        <app-answer-create 
            [answerFormGroup]="answer" 
            [answerIndex]="$index"
            (removeAnswer)="onRemoveAnswer($event)"
            ></app-answer-create>
    }

    @if(answerCount() < 6){
        <app-button (click)='onAddAnswer()'>Add answer</app-button>
    }

</figure>
