<button 
    type="button" 
    class="answer-btn" 
    [class.answer-btn--active]="answerControl().controls.select.value" 
    (click)="onAnswerClick()">

    <div class="answer-btn-check" [class.answer-btn-check--active]="answerControl().controls.select.value">
        @if(answerControl().controls.select.value){
            <div class="check-icon"></div>
        }
    </div>

    <span class="answer-btn__identifier">{{identifier}}.</span>

    <span class="answer-btn__answer">{{answer.value}}</span>

</button>
