@if(surveyWithCategory(); as survey){
    <section [ngClass]="['card', cardVariant() == 'highlights' ? 'card--highlights' : 'card--listview']"
        (mouseenter)="onMouseEnter()" 
        (mouseleave)="onMouseLeave()">

        <p class="card-category">
            {{survey.category.name}}</p>

        <h5 class="card-title">
            {{survey.title}}</h5>

        <app-status 
            [isActive]="isHover()" 
            [canHover]="cardVariant() == 'highlights'">
            {{survey.difference_in_days | expiryViewChange}}
        </app-status>


    </section>
}
