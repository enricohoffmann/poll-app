<article class="date-field">

    <label for="end-date" class="date-field__label">Set end date <span class="date-field__label--optional">(optional)</span></label>

    <div class="date-field__container">
        <input id="end-date" name="end-date" type="text" class="date-field__input">
        <button type="button" class="date-field__button" (click)="onCalenderButtonClick()">
            <div class="date-field__button__icon"></div>
        </button>
    </div>

    <div class="date-field__date-container">
        <label for="end-date-select"></label>
        <input 
            id="end-date-select" 
            name="end-date-select" 
            type="date" 
            class="date-field__date-select"
            #dateSelectField
            >
    </div>
   
    <app-button class="" [buttonVariant]="'trashBtn'" [hasIcon]="false" [hasTrashIcon]="true"></app-button>


    


</article>
