<div class="create-wrapper">
    <section class="create-section">

        <!-- Hier muss noch eine andere Farbe rein -->
        <app-status [canHover]="false">Draft</app-status>
        <header class="create-section-header">
            <h1 class="create-section-header__title">Create new survey</h1>
            <app-button>Cancel</app-button>
        </header>

        <form class="create-form" [formGroup]="surveyForm" (ngSubmit)="onSubmit()">

            <div class="create-form__fields">
                <fieldset class="create-form__fields__fieldset--survey-info">
                    <app-input-field [inputFieldVariant]="'labelTop'" [inputControl]="surveyForm.controls.title"
                        [label]="'Survey name'" [fieldId]="'survey-title'" [placeHolder]="''"
                        [hasTrash]="true"></app-input-field>

                    <app-input-field [inputFieldVariant]="'textArea'" [inputControl]="surveyForm.controls.description"
                        [label]="'Describing text'" [isOptional]="true"
                    ></app-input-field>

                    <div class="create-form__fields__fieldset--survey-info--date-and-category">
                        <!-- <app-input-field class="set-date-field" [inputFieldVariant]="'labelTop'" [inputControl]="surveyForm.controls.expires_at" 
                        [label]="'Set end date'" [isOptional]="true"
                        ></app-input-field> -->
                        <app-date-field [dateInputControl]="surveyForm.controls.expires_at"></app-date-field>

                        <app-drop-down-menu class="choose-category-field" (sendCategorySelection)="onChooseCategory($event)" >Choose category</app-drop-down-menu>

                        <span class="current-category-field">{{currentCategory()?.name}}</span>

                    </div>
                </fieldset>

                <article class="create-form__fields__fieldset--survey-info mt-32">

                    @for(question of questions.controls; track $index){
                        <app-question-create 
                            [questionFormGroup]="question" 
                            (addAnswerEvent)="addAnswer($event)"
                            (removeAnswerEvent)="removeAnswer($event)"
                            [questionIndex]="$index"
                            (removeQuestionEvent)="removeQuestion($event)"
                            ></app-question-create>
                    }

                    <app-button (click)="addQuestion()">Add next question</app-button>

                </article>

                

            </div>

            <button type="submit">submit</button>

        </form>


    </section>

</div>
